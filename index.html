<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Selector - All Channels</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    /* Launcher screen */
    #launcher {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 15px;
      box-sizing: border-box;
    }

    #launcher header {
      text-align: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
      margin-bottom: 10px;
    }

    #launcher h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    #searchBox {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 15px;
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #444;
      border-radius: 25px;
      background: #1a1a1a;
      color: white;
      outline: none;
    }

    #channelGrid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      padding-right: 5px;
    }

    .channel-btn {
      background: #1a1a1a;
      color: white;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .channel-btn:hover {
      background: #e50914;
      border-color: #e50914;
      transform: translateY(-1px);
    }

    .channel-number {
      font-weight: bold;
      color: #ff6b6b;
      font-size: 12px;
    }

    .channel-btn:hover .channel-number {
      color: white;
    }

    .channel-name {
      font-size: 12px;
      opacity: 0.95;
    }

    /* Player */
    #player {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9999;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #exitBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 10000;
      background: rgba(229, 9, 20, 0.95);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      display: none;
    }

    #currentStream {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      background: rgba(30, 30, 30, 0.95);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      display: none;
      font-family: monospace;
    }

    /* 🔥 Player Switch Bar - FIXED Z-INDEX & EXACT FIRST SCRIPT STYLE */
    #playerSwitch {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      z-index: 10001; /* Must be higher than #player (9999) */
    }

    .player-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      border-radius: 3px;
      transition: background 0.2s;
    }

    .player-btn:hover, .player-btn.active {
      background: rgba(255,255,255,0.4);
    }

  </style>
</head>

    const launcher = document.getElementById('launcher');
    const player = document.getElementById('player');
    const streamFrame = document.getElementById('streamFrame');
    const exitBtn = document.getElementById('exitBtn');
    const currentStream = document.getElementById('currentStream');
    const grid = document.getElementById('channelGrid');
    const searchBox = document.getElementById('searchBox');
    const playerSwitch = document.getElementById('playerSwitch');

    let players = [];
    let currentIndex = 0;
    let currentLabel = "";

    function getPlayers(id) {
      return [
        `https://dlstreams.top/stream/stream-${id}.php`,
        `https://dlstreams.top/cast/stream-${id}.php`,
        `https://dlstreams.top/watch/stream-${id}.php`,
        `https://dlstreams.top/plus/stream-${id}.php`,
        `https://dlstreams.top/casting/stream-${id}.php`,
        `https://dlstreams.top/player/stream-${id}.php`
      ];
    }

    function render(filter="") {
      grid.innerHTML = "";
      channels.forEach(([id,name]) => {
        if(filter && !name.toLowerCase().includes(filter.toLowerCase())) return;
        const btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.innerHTML = `<span class="channel-number">#${id}</span><span class="channel-name">${name}</span>`;
        btn.onclick = () => {
          players = getPlayers(id);
          currentIndex = 0;
          currentLabel = `${id} - ${name}`;
          openPlayer();
        };
        grid.appendChild(btn);
      });
    }

    function openPlayer(){
      launcher.style.display="none";
      player.style.display="block";
      exitBtn.style.display="block";
      playerSwitch.style.display="flex";
      currentStream.style.display="block";

      loadPlayer(0);
      renderSwitch();
    }

    function loadPlayer(i){
      currentIndex = i;
      streamFrame.src = players[i];
      currentStream.textContent = `${currentLabel} (Player ${i+1})`;
      document.querySelectorAll('.player-btn').forEach((b, idx)=>{
        b.classList.remove('active');
        if(idx === i) b.classList.add('active');
      });
    }

    function renderSwitch(){
      playerSwitch.innerHTML="";
      players.forEach((_,i)=>{
        const b=document.createElement('button');
        b.className='player-btn';
        b.textContent=`P${i+1}`;
        if (i === 0) b.classList.add('active');
        b.onclick=()=>loadPlayer(i);
        playerSwitch.appendChild(b);
      });
    }

    exitBtn.onclick=()=>{
      player.style.display="none";
      exitBtn.style.display="none";
      playerSwitch.style.display="none";
      currentStream.style.display="none";
      launcher.style.display="flex";
      streamFrame.src="";
    };

    searchBox.oninput=(e)=>render(e.target.value);
    render();
</script>
