<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Selector - All Channels</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    /* Launcher screen */
    #launcher {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 15px;
      box-sizing: border-box;
    }

    #launcher header {
      text-align: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
      margin-bottom: 10px;
    }

    #launcher h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    #searchBox {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 15px;
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #444;
      border-radius: 25px;
      background: #1a1a1a;
      color: white;
      outline: none;
    }

    #channelGrid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      padding-right: 5px;
    }

    .channel-btn {
      background: #1a1a1a;
      color: white;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .channel-btn:hover {
      background: #e50914;
      border-color: #e50914;
      transform: translateY(-1px);
    }

    /* 🔥 ADDED: Sync keyboard focus with hover style */
    .channel-btn.keyboard-focus {
      background: #e50914 !important;
      border-color: #e50914 !important;
      transform: translateY(-1px) !important;
      outline: none;
    }

    .channel-number {
      font-weight: bold;
      color: #ff6b6b;
      font-size: 12px;
    }

    .channel-btn:hover .channel-number {
      color: white;
    }

    .channel-name {
      font-size: 12px;
      opacity: 0.95;
    }

    /* Player */
    #player {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9999;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #exitBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 10000;
      background: rgba(229, 9, 20, 0.95);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      display: none;
    }

    #currentStream {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      background: rgba(30, 30, 30, 0.95);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      display: none;
      font-family: monospace;
    }

    /* 🔥 Player Switch Bar - FIXED Z-INDEX & EXACT FIRST SCRIPT STYLE */
    #playerSwitch {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      z-index: 10001; /* Must be higher than #player (9999) */
    }

    .player-btn {
      background: rgba(20, 20, 30, 0.9);   /* Dark subtle background */
      color: #4da6ff;                       /* 🔵 BLUE text/letters */
      border: 2px solid #ff3344;            /* 🔴 RED edge/border */
      padding: 4px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      transition: all 0.2s ease;
      text-shadow: 0 0 2px rgba(77, 166, 255, 0.5); /* Soft blue glow on text */
    }

    .player-btn:hover {
      background: rgba(40, 40, 60, 0.95);
      border-color: #ff6677;                /* Lighter red on hover */
      color: #80c1ff;                       /* Brighter blue text on hover */
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(255, 51, 68, 0.4);
    }

    .player-btn.active {
      background: rgba(30, 30, 50, 1);
      border-color: #ff0022;                /* Vivid red for active */
      color: #b3d9ff;                       /* Light blue for active text */
      box-shadow: 0 0 10px rgba(255, 0, 34, 0.6),
                  0 0 20px rgba(77, 166, 255, 0.3);
    }

  </style>
</head>

    const launcher = document.getElementById('launcher');
    const player = document.getElementById('player');
    const streamFrame = document.getElementById('streamFrame');
    const exitBtn = document.getElementById('exitBtn');
    const currentStream = document.getElementById('currentStream');
    const grid = document.getElementById('channelGrid');
    const searchBox = document.getElementById('searchBox');
    const playerSwitch = document.getElementById('playerSwitch');

    let players = [];
    let currentIndex = 0;
    let currentLabel = "";

    function getPlayers(id) {
      return [
        `https://resportz.cfd/live/stream-${id}.php`,  
        `https://dlhd.pk/stream/stream-${id}.php`,
        `https://dlhd.pk/cast/stream-${id}.php`,
        `https://dlhd.pk/watch/stream-${id}.php`,
        `https://dlhd.pk/plus/stream-${id}.php`,
        `https://dlhd.pk/casting/stream-${id}.php`,
        `https://dlhd.pk/player/stream-${id}.php`,
        `https://daddylive.eu/embed/embed.php?id=${id}&player=1&source=tv.json`,       
      ];
    }

    function render(filter="") {
      grid.innerHTML = "";
      channels.forEach(([id,name]) => {
        if(filter && !name.toLowerCase().includes(filter.toLowerCase())) return;
        const btn = document.createElement('button');
        btn.className = 'channel-btn';
        btn.innerHTML = `<span class="channel-number">#${id}</span><span class="channel-name">${name}</span>`;
        btn.onclick = () => {
          players = getPlayers(id);
          currentIndex = 0;
          currentLabel = `${id} - ${name}`;
          openPlayer();
        };
        // 🔥 ADDED: Sync mouse hover with keyboard nav index
        btn.onmouseenter = () => { navIdx = [...grid.querySelectorAll('.channel-btn')].indexOf(btn); updateKeyboardFocus(); };
        btn.onmouseleave = () => { if (!grid.matches(':hover')) updateKeyboardFocus(); };
        grid.appendChild(btn);
      });
    }

    function openPlayer(){
      launcher.style.display="none";
      player.style.display="block";
      exitBtn.style.display="block";
      playerSwitch.style.display="flex";
      currentStream.style.display="block";

      loadPlayer(0);
      renderSwitch();
    }

    function loadPlayer(i){
      currentIndex = i;
      streamFrame.src = players[i];
      currentStream.textContent = `${currentLabel} (Player ${i+1})`;
      document.querySelectorAll('.player-btn').forEach((b, idx)=>{
        b.classList.remove('active');
        if(idx === i) b.classList.add('active');
      });
    }

    function renderSwitch(){
      playerSwitch.innerHTML="";
      players.forEach((_,i)=>{
        const b=document.createElement('button');
        b.className='player-btn';
        b.textContent=`P${i+1}`;
        if (i === 0) b.classList.add('active');
        b.onclick=()=>loadPlayer(i);
        playerSwitch.appendChild(b);
      });
    }

    exitBtn.onclick=()=>{
      player.style.display="none";
      exitBtn.style.display="none";
      playerSwitch.style.display="none";
      currentStream.style.display="none";
      launcher.style.display="flex";
      streamFrame.src="";
    };

    searchBox.oninput=(e)=>render(e.target.value);
    render();

    // 🔥 Keyboard + Mouse Sync Navigation (ADDED/UPDATED ONLY THIS BLOCK)
    let navIdx = -1;

    function updateKeyboardFocus() {
      const btns = grid.querySelectorAll('.channel-btn');
      btns.forEach((b, i) => {
        b.classList.toggle('keyboard-focus', i === navIdx && !b.matches(':hover'));
      });
    }

    const gridObserver = new MutationObserver(() => {
      if (!searchBox.value.trim() && grid.children.length > 0 && navIdx < 0) {
        navIdx = 0;
        updateKeyboardFocus();
        const firstBtn = grid.querySelector('.channel-btn');
        if (firstBtn) firstBtn.focus({ preventScroll: true });
      }
    });
    gridObserver.observe(grid, { childList: true });

    document.addEventListener('keydown', (e) => {
      if (launcher.style.display === 'none') return;
      if (document.activeElement === searchBox) return;
      
      const btns = [...grid.querySelectorAll('.channel-btn')];
      if (btns.length === 0) return;
      
      const getCols = () => {
        if (btns.length < 2) return 1;
        const firstTop = btns[0].getBoundingClientRect().top;
        for (let i = 1; i < btns.length; i++) {
          if (Math.abs(btns[i].getBoundingClientRect().top - firstTop) > 8) return i;
        }
        return btns.length;
      };
      const cols = getCols();
      
      let nextIdx = navIdx;
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        nextIdx = Math.min(btns.length - 1, navIdx + cols);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        nextIdx = Math.max(0, navIdx - cols);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        nextIdx = Math.min(btns.length - 1, navIdx + 1);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        nextIdx = Math.max(0, navIdx - 1);
      } else if ((e.key === 'Enter' || e.key === ' ') && navIdx >= 0 && navIdx < btns.length) {
        e.preventDefault();
        btns[navIdx].click();
        return;
      } else {
        return;
      }
      
      if (nextIdx !== navIdx && nextIdx >= 0 && nextIdx < btns.length) {
        navIdx = nextIdx;
        const btn = btns[navIdx];
        btn.focus({ preventScroll: true });
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        updateKeyboardFocus();
      }
    });

    // Reset navigation when search changes
    searchBox.addEventListener('input', () => { navIdx = -1; updateKeyboardFocus(); });
    
    // Clear keyboard focus when mouse leaves grid entirely
    grid.addEventListener('mouseleave', () => { updateKeyboardFocus(); });
</script>
