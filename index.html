  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    /* Launcher screen */
    #launcher {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 15px;
      box-sizing: border-box;
    }

    #launcher header {
      text-align: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
      margin-bottom: 10px;
    }

    #launcher h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    /* Search bar */
    #searchBox {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 15px;
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #444;
      border-radius: 25px;
      background: #1a1a1a;
      color: white;
      outline: none;
    }
    #searchBox::placeholder { color: #888; }

    /* Channel grid */
    #channelGrid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      padding-right: 5px;
    }

    /* Scrollbar styling */
    #channelGrid::-webkit-scrollbar { width: 6px; }
    #channelGrid::-webkit-scrollbar-track { background: #111; }
    #channelGrid::-webkit-scrollbar-thumb { background: #e50914; border-radius: 3px; }

    .channel-btn {
      background: #1a1a1a;
      color: white;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .channel-btn:hover {
      background: #e50914;
      border-color: #e50914;
      transform: translateY(-1px);
    }

    .channel-number {
      font-weight: bold;
      color: #ff6b6b;
      font-size: 12px;
    }
    .channel-btn:hover .channel-number { color: white; }

    .channel-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      opacity: 0.95;
    }

    .channel-url {
      font-size: 10px;
      opacity: 0.6;
      font-family: monospace;
      word-break: break-all;
      display: none; /* Hidden by default, shown on hover if needed */
    }

    /* Player screen */
    #player {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Exit button */
    #exitBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 10000;
      background: rgba(229, 9, 20, 0.95);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      display: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    #exitBtn:hover { background: rgba(244, 6, 18, 1); }

    /* Current stream indicator */
    #currentStream {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      background: rgba(30, 30, 30, 0.95);
      color: #eee;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      display: none;
      max-width: 95%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
    }

    /* Stats bar */
    #stats {
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
      padding: 5px 0;
      border-top: 1px solid #333;
    }
  </style>

      const lowerFilter = filter.toLowerCase();

      });
      
      const visible = channelGrid.children.length;
      stats.textContent = `Showing ${visible} of ${channels.length} channels`;
    }

    // Start stream

      streamFrame.src = url;
      launcher.style.display = 'none';
      player.style.display = 'block';
      exitBtn.style.display = 'block';
      currentStream.textContent = label;
      currentStream.style.display = 'block';

    }

      if (element.requestFullscreen) {
        element.requestFullscreen().catch(e => console.log("Fullscreen error:", e));
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      } else if (element.msRequestFullscreen) {
        element.msRequestFullscreen();
      }
    }

      if (document.fullscreenElement) {

      exitBtn.style.display = 'none';
      currentStream.style.display = 'none';
      launcher.style.display = 'flex';
      // Optional: streamFrame.src = "";
    }

      if (!document.fullscreenElement && player.style.display === 'block') {
        exitStream();
      }
    });

      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        renderChannels(e.target.value.trim());
      }, 150); // Debounce for performance
    });

    // Initialize
